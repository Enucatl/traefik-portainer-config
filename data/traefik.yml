accesslog: false
api:
  dashboard: true
  insecure: false

ping:
  entryPoint: ping

entryPoints:
  http:
    address: ":80"
    http:
      middlewares:
        - public-rate-limit@file
  https:
    address: ":443"
    http:
      middlewares:
        - public-rate-limit@file
  ping:
    address: ":8082"
  protonmail-bridge-imap:
    address: ":1243"
  protonmail-bridge-smtp:
    address: ":1125"
  postgres:
    address: ":5432"
  checkmk:
    address: ":8000"

log:
  level: DEBUG
  format: json

global:
  checkNewVersion: false
  sendAnonymousUsage: false

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    directory: /etc/traefik
    watch: true

# disable upstream HTTPS certificate checks (https > https)
serversTransport:
    insecureSkipVerify: true
