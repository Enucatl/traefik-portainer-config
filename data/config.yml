tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/docker_fullchain.pem
        keyFile: /etc/traefik/certs/docker_key.pem


http:

  routers:

    block-probe-paths-http:
      rule: PathRegexp(`(?i)^/(?:\.env|\.git|wp-admin|phpmyadmin)(?:$|/|[._-])`)
      priority: 100000
      service: noop@internal
      entryPoints:
        - "http"

    block-probe-paths-https:
      rule: PathRegexp(`(?i)^/(?:\.env|\.git|wp-admin|phpmyadmin)(?:$|/|[._-])`)
      priority: 100000
      service: noop@internal
      entryPoints:
        - "https"
      tls: {}

    http-to-https:
      rule: PathPrefix(`/`)
      priority: 99999
      service: noop@internal
      middlewares:
        - https-redirectscheme
      entryPoints:
        - "http"

    unknown-hosts:
      rule: PathPrefix(`/`)
      priority: 1
      service: noop@internal
      entryPoints:
        - "https"
      tls: {}

    salt-box:
      rule: Host(`salt-box.docker.home.arpa`)
      service: salt-box
      middlewares:
        - secured
      entryPoints:
        - "https"
      tls: {}

    traefik:
      rule: Host(`traefik.docker.home.arpa`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
      service: api@internal
      middlewares:
        - secured
      entryPoints:
        - "https"
      tls: {}


  services:

    salt-box:
      loadBalancer:
        servers:
          - url: "http://salt.box/"

  middlewares:

    https-redirectscheme:
      redirectScheme:
        scheme: https
        permanent: true

    default-allowlist:
      ipAllowList:
        sourceRange:
          - '{{ env "LAN_SUBNET" }}'
          - '{{ env "TRUSTED_WIFI_SUBNET" }}'
          - '{{ env "WG_SUBNET" }}'
          # Matches the Docker default address pool from /etc/docker/daemon.json.
          - '172.16.0.0/12'
          - '{{ env "IPV6_LAN_SUBNET" }}'
          - '{{ env "IPV6_TRUSTED_WIFI_SUBNET" }}'
          - '{{ env "IPV6_WG_SUBNET" }}'

    public-rate-limit:
      rateLimit:
        average: 1000
        period: 1m
        burst: 100

    secured:
      chain:
        middlewares:
        - https-redirectscheme
        - default-allowlist
