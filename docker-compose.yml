services:

  socket-proxy:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: hardened-tiny
    image: 11notes/socket-proxy@sha256:6806f9b3cfe64325ae2dc967381412e415d868c9542753962fd2e73f4f9686f1
    container_name: socket-proxy
    restart: unless-stopped
    network_mode: none
    read_only: true
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    # The host runs Docker with userns-remap: default. The proxy needs host
    # userns to access the real Docker socket.
    userns_mode: host
    user: "0:988"
    # Docker remaps Traefik's container UID 1000 to host UID 101000. Own the
    # exported proxy socket by that host ID so Traefik can use Unix socket
    # permissions instead of the TCP Docker API proxy.
    environment:
      SOCKET_PROXY_UID: "101000"
      SOCKET_PROXY_GID: "101000"
    volumes:
      - /var/run/docker.sock:/run/docker.sock:ro
      - socket-proxy.run:/run/proxy

  traefik:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: traefik-edge
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    cpu_shares: 2048
    user: "1000:1000"
    depends_on:
      socket-proxy:
        condition: service_healthy
        restart: true
    networks:
      - traefik_proxy
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./data:/etc/traefik:ro
      - socket-proxy.run:/var/run

    environment:
      - LAN_SUBNET
      - TRUSTED_WIFI_SUBNET
      - WG_SUBNET
      - IPV6_LAN_SUBNET
      - IPV6_TRUSTED_WIFI_SUBNET
      - IPV6_WG_SUBNET
    command:
      # HTTP Entrypoint
      - "--entrypoints.http.forwardedHeaders.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
      - "--entrypoints.http.proxyProtocol.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
      # HTTPS Entrypoint
      - "--entrypoints.https.forwardedHeaders.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
      - "--entrypoints.https.proxyProtocol.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"

networks:
  traefik_proxy:
    external: true

volumes:
  socket-proxy.run:
