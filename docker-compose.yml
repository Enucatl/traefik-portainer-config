services:

  traefik:
    extends:
      file: ../compose-security-baseline/hardening.yml
      service: traefik-edge
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    cpu_shares: 2048
    cap_add:
      - NET_BIND_SERVICE
      - DAC_READ_SEARCH
    # Keep this explicit: Traefik needs direct Docker API discovery until a socket proxy is introduced.
    userns_mode: host
    networks:
      - traefik_proxy
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./data:/etc/traefik:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - LAN_SUBNET
      - TRUSTED_WIFI_SUBNET
      - WG_SUBNET
      - IPV6_LAN_SUBNET
      - IPV6_TRUSTED_WIFI_SUBNET
      - IPV6_WG_SUBNET
    command:
      # HTTP Entrypoint
      - "--entrypoints.http.forwardedHeaders.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
      - "--entrypoints.http.proxyProtocol.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
      # HTTPS Entrypoint
      - "--entrypoints.https.forwardedHeaders.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
      - "--entrypoints.https.proxyProtocol.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_LAN_SUBNET},${IPV6_TRUSTED_WIFI_SUBNET},${IPV6_WG_SUBNET}"
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"

networks:
  traefik_proxy:
    external: true
