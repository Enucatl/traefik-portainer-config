services:

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    userns_mode: host
    security_opt:
      - no-new-privileges:true
    networks:
      - traefik_proxy
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./data:/etc/traefik:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - IPV6_PREFIX
    command:
      # HTTP Entrypoint
      - "--entrypoints.http.forwardedHeaders.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_PREFIX}:0::/64,${IPV6_PREFIX}:a::/64,${IPV6_PREFIX}:c8::/64"
      - "--entrypoints.http.proxyProtocol.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_PREFIX}:0::/64,${IPV6_PREFIX}:a::/64,${IPV6_PREFIX}:c8::/64"
      # HTTPS Entrypoint
      - "--entrypoints.https.forwardedHeaders.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_PREFIX}:0::/64,${IPV6_PREFIX}:a::/64,${IPV6_PREFIX}:c8::/64"
      - "--entrypoints.https.proxyProtocol.trustedIPs=${LAN_SUBNET},${TRUSTED_WIFI_SUBNET},${WG_SUBNET},172.17.0.0/16,${IPV6_PREFIX}:0::/64,${IPV6_PREFIX}:a::/64,${IPV6_PREFIX}:c8::/64"
    labels:
      - "checkmk_monitor=true"
      - "traefik.enable=true"

networks:
  traefik_proxy:
    external: true
